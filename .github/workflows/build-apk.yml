name: 📱 Build MNAENCA APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 🔧 Build MNAENCA Files
        run: python scraper.py

      - name: 📱 Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📱 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📱 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Install Capacitor
        run: |
          npm install -g @capacitor/cli @capacitor/core @capacitor/android

      - name: 🏗️ Prepare Web Assets
        run: |
          mkdir -p www
          cp *.html www/ 2>/dev/null || true
          cp *.js www/ 2>/dev/null || true
          cp -r resources www/ 2>/dev/null || true
          echo "✅ Web assets prepared"

      - name: ⚙️ Setup Capacitor
        run: |
          npx cap add android 2>/dev/null || echo "Android platform already exists"
          npx cap sync android
          echo "✅ Capacitor configured"

      - name: 🔨 Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
          echo "✅ APK built successfully"

      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MNAENCA-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: ✅ Success Message
        run: |
          echo "╔════════════════════════════════════════════╗"
          echo "║  📱 MNAENCA APK Build Complete!          ║"
          echo "║  ✅ تم بناء التطبيق بنجاح                 ║"
          echo "╚════════════════════════════════════════════╝"
